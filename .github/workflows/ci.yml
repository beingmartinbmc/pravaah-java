name: ci

on:
  push:
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-artifact:
    name: Build artifact
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Verify build
        run: mvn -B --no-transfer-progress -P central-release -Dgpg.skip=true clean verify

      - name: Check test coverage >= 90%
        run: mvn -B --no-transfer-progress jacoco:check

      - name: Prepare runtime artifact
        shell: bash
        run: |
          jar_path="$(find target -maxdepth 1 -type f -name 'pravaah-java-*.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' -print -quit)"
          if [[ -z "$jar_path" ]]; then
            echo "Runtime jar was not produced" >&2
            exit 1
          fi
          cp "$jar_path" target/pravaah-ci-runtime.jar

      - name: Upload artifact for runtime checks
        uses: actions/upload-artifact@v4
        with:
          name: pravaah-ci-jar
          path: target/pravaah-ci-runtime.jar
          if-no-files-found: error

  runtime-compatibility:
    name: Runtime compatibility on Java ${{ matrix.java-version }}
    runs-on: ubuntu-latest
    needs: build-artifact
    strategy:
      fail-fast: false
      matrix:
        java-version: ["8", "11", "17"]

    steps:
      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: pravaah-ci-jar
          path: release-artifact

      - name: Run CSV smoke test against built jar
        shell: bash
        run: |
          cat > RuntimeSmoke.java <<'JAVA'
          import io.github.beingmartinbmc.pravaah.Pravaah;
          import io.github.beingmartinbmc.pravaah.PravaahFormat;
          import io.github.beingmartinbmc.pravaah.ReadOptions;
          import io.github.beingmartinbmc.pravaah.Row;
          import java.io.File;
          import java.io.FileOutputStream;
          import java.io.OutputStreamWriter;
          import java.io.Writer;
          import java.util.List;

          public class RuntimeSmoke {
              public static void main(String[] args) throws Exception {
                  File input = File.createTempFile("pravaah-runtime-smoke", ".csv");
                  Writer writer = new OutputStreamWriter(new FileOutputStream(input), "UTF-8");
                  writer.write("name,total\nAda,42\nGrace,99\n");
                  writer.close();

                  List<Row> rows = Pravaah.read(
                          input.getAbsolutePath(),
                          ReadOptions.defaults().format(PravaahFormat.CSV)
                  ).collect();

                  if (rows.size() != 2) {
                      throw new IllegalStateException("Expected 2 rows but got " + rows.size());
                  }
                  if (!"Ada".equals(rows.get(0).getString("name"))) {
                      throw new IllegalStateException("Unexpected first row: " + rows.get(0));
                  }
                  if (!"99".equals(rows.get(1).getString("total"))) {
                      throw new IllegalStateException("Unexpected second total: " + rows.get(1));
                  }
              }
          }
          JAVA

          jar_path="release-artifact/pravaah-ci-runtime.jar"
          javac -cp "$jar_path" RuntimeSmoke.java
          java -cp "$jar_path:." RuntimeSmoke
