name: release-to-maven-central

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version to publish, for example 1.0.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-to-maven-central
  cancel-in-progress: false

jobs:
  build-release-artifact:
    name: Build release artifact
    runs-on: ubuntu-latest

    steps:
      - name: Validate release version
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          version="$RELEASE_VERSION"
          if [[ -z "$version" ]]; then
            echo "release_version is required" >&2
            exit 1
          fi
          if [[ "$version" == *-SNAPSHOT ]]; then
            echo "Maven Central releases must not use a -SNAPSHOT version" >&2
            exit 1
          fi
          echo "Releasing version $version"

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set Maven release version
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: mvn -B --no-transfer-progress versions:set -DnewVersion="$RELEASE_VERSION" -DgenerateBackupPoms=false

      - name: Verify release build
        run: mvn -B --no-transfer-progress -P central-release -Dgpg.skip=true clean verify

      - name: Upload release artifact for runtime checks
        uses: actions/upload-artifact@v4
        with:
          name: pravaah-release-jar
          path: target/pravaah-java-${{ inputs.release_version }}.jar
          if-no-files-found: error

  runtime-compatibility:
    name: Runtime compatibility on Java ${{ matrix.java-version }}
    runs-on: ubuntu-latest
    needs: build-release-artifact
    strategy:
      fail-fast: false
      matrix:
        java-version: ["8", "11", "17"]

    steps:
      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: pravaah-release-jar
          path: release-artifact

      - name: Run CSV smoke test against release jar
        shell: bash
        run: |
          cat > RuntimeSmoke.java <<'JAVA'
          import io.github.beingmartinbmc.pravaah.Pravaah;
          import io.github.beingmartinbmc.pravaah.PravaahFormat;
          import io.github.beingmartinbmc.pravaah.ReadOptions;
          import io.github.beingmartinbmc.pravaah.Row;
          import java.io.File;
          import java.io.FileOutputStream;
          import java.io.OutputStreamWriter;
          import java.io.Writer;
          import java.util.List;

          public class RuntimeSmoke {
              public static void main(String[] args) throws Exception {
                  File input = File.createTempFile("pravaah-runtime-smoke", ".csv");
                  Writer writer = new OutputStreamWriter(new FileOutputStream(input), "UTF-8");
                  writer.write("name,total\nAda,42\nGrace,99\n");
                  writer.close();

                  List<Row> rows = Pravaah.read(
                          input.getAbsolutePath(),
                          ReadOptions.defaults().format(PravaahFormat.CSV)
                  ).collect();

                  if (rows.size() != 2) {
                      throw new IllegalStateException("Expected 2 rows but got " + rows.size());
                  }
                  if (!"Ada".equals(rows.get(0).getString("name"))) {
                      throw new IllegalStateException("Unexpected first row: " + rows.get(0));
                  }
                  if (!"99".equals(rows.get(1).getString("total"))) {
                      throw new IllegalStateException("Unexpected second total: " + rows.get(1));
                  }
              }
          }
          JAVA

          jar_path="$(ls release-artifact/pravaah-java-*.jar)"
          javac -cp "$jar_path" RuntimeSmoke.java
          java -cp "$jar_path:." RuntimeSmoke

  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    needs: runtime-compatibility
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK and Maven Central credentials
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Set Maven release version
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: mvn -B --no-transfer-progress versions:set -DnewVersion="$RELEASE_VERSION" -DgenerateBackupPoms=false

      - name: Publish to Maven Central
        run: mvn -B --no-transfer-progress -P central-release deploy -DskipTests -Dgpg.passphrase="$GPG_PASSPHRASE"
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
